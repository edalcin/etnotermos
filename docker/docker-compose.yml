version: '3.8'

# Copy docker/.env.example → docker/.env and fill in ADMIN_USERS before running.

services:
  etnotermos:
    build:
      context: ..
      dockerfile: docker/etnotermos.Dockerfile
    container_name: etnotermos-app
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PUBLIC_PORT: 4000
      ADMIN_PORT: 4001
      # Shared MongoDB instance — same host as BioCultDB
      MONGODB_URI: ${MONGODB_URI:-mongodb://host.docker.internal:27017/etnodb}
      # JSON array: [{"username":"x","passwordHash":"$2b$10$..."}]
      ADMIN_USERS: ${ADMIN_USERS}
      AUDIO_STORAGE_PATH: /data/audio
      ACQUISITION_CRON_SCHEDULE: ${ACQUISITION_CRON_SCHEDULE:-0 3 * * *}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "4000:4000"
      - "4001:4001"
    volumes:
      - audio_data:/data/audio
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  audio_data:
    driver: local
