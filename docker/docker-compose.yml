version: '3.8'

# Copy docker/.env.example → docker/.env and fill in ADMIN_USERS before running.

services:
  etnotermos:
    build:
      context: ..
      dockerfile: docker/etnotermos.Dockerfile
    container_name: etnotermos-app
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PUBLIC_PORT: 4000
      ADMIN_PORT: 4001
      # Arquivo SQLite local de dev standalone. Em produção (Etapa 7 do plano de
      # migração v3.1), este compose é substituído pelo container único da unidade
      # federada, que compartilha o mesmo arquivo SQLite com o BioCultDB.
      SQLITE_DB_PATH: ${SQLITE_DB_PATH:-/data/unidade-dev.sqlite}
      # JSON array: [{"username":"x","passwordHash":"$2b$10$..."}]
      ADMIN_USERS: ${ADMIN_USERS}
      AUDIO_STORAGE_PATH: /data/audio
      ACQUISITION_CRON_SCHEDULE: ${ACQUISITION_CRON_SCHEDULE:-0 3 * * *}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "4000:4000"
      - "4001:4001"
    volumes:
      - unit_data:/data

volumes:
  unit_data:
    driver: local
